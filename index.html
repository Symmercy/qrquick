<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-BS Custom QR Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold mb-1 text-center text-indigo-400">QR Code Studio</h1>
        <p class="text-slate-400 text-sm mb-6 text-center">Simple, instant, and clean customization.</p>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Content / URL</label>
                <input 
                    type="text" 
                    id="text-input" 
                    placeholder="https://example.com" 
                    class="w-full px-4 py-2.5 bg-slate-900 border border-slate-600 rounded-lg focus:outline-none focus:border-indigo-500 text-white text-sm transition-colors"
                    value="https://github.com"
                >
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">QR Color</label>
                    <div class="flex items-center gap-2 bg-slate-900 border border-slate-600 rounded-lg p-2">
                        <input type="color" id="fg-color" value="#000000" class="w-8 h-8 rounded border-0 cursor-pointer bg-transparent">
                        <span id="fg-val" class="text-xs text-slate-300 uppercase font-mono">#000000</span>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">BG Color</label>
                    <div class="flex items-center gap-2 bg-slate-900 border border-slate-600 rounded-lg p-2">
                        <input type="color" id="bg-color" value="#ffffff" class="w-8 h-8 rounded border-0 cursor-pointer bg-transparent">
                        <span id="bg-val" class="text-xs text-slate-300 uppercase font-mono">#ffffff</span>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Center Logo (Optional)</label>
                <input 
                    type="file" 
                    id="logo-input" 
                    accept="image/*"
                    class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-indigo-900 file:text-indigo-300 hover:file:bg-indigo-800 cursor-pointer"
                >
            </div>

            <div class="flex flex-col items-center justify-center bg-slate-900 p-4 rounded-xl my-4 min-h-[232px] w-full border border-slate-700 shadow-inner">
                <div id="qrcode" class="p-2 bg-white rounded-lg"></div>
            </div>

            <button 
                id="download-btn" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-4 rounded-lg transition-colors cursor-pointer shadow-md text-center text-sm"
            >
                Download Customized PNG
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.1/dist/easy.qrcode.min.js"></script>

    <script>
        const textInput = document.getElementById('text-input');
        const fgColorInput = document.getElementById('fg-color');
        const bgColorInput = document.getElementById('bg-color');
        const fgVal = document.getElementById('fg-val');
        const bgVal = document.getElementById('bg-val');
        const logoInput = document.getElementById('logo-input');
        const qrContainer = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');
        
        let logoBase64 = undefined;

        // Core generation logic
        function updateQRCode() {
            const text = textInput.value.trim();
            qrContainer.innerHTML = "";

            if (!text) {
                downloadBtn.style.display = 'none';
                return;
            }
            downloadBtn.style.display = 'block';

            // Sync visual text labels for hex codes
            fgVal.textContent = fgColorInput.value;
            bgVal.textContent = bgColorInput.value;

            // Generate clean QR with options
            new QRCode(qrContainer, {
                text: text,
                width: 200,
                height: 200,
                colorDark: fgColorInput.value,
                colorLight: bgColorInput.value,
                correctLevel: QRCode.CorrectLevel.H, // Keep high so logos don't break scanning
                // Logo settings
                logo: logoBase64,
                logoWidth: 50,
                logoHeight: 50,
                logoBackgroundColor: bgColorInput.value,
                logoBackgroundTransparent: false
            });
        }

        // Live input listeners
        textInput.addEventListener('input', updateQRCode);
        fgColorInput.addEventListener('input', updateQRCode);
        bgColorInput.addEventListener('input', updateQRCode);

        // Convert uploaded image to base64
        logoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    logoBase64 = event.target.result;
                    updateQRCode();
                };
                reader.readAsDataURL(file);
            } else {
                logoBase64 = undefined;
                updateQRCode();
            }
        });

        // Instant Download action
        downloadBtn.addEventListener('click', () => {
            const img = qrContainer.querySelector('img');
            if (img) {
                const link = document.createElement('a');
                link.href = img.src;
                link.download = 'custom-qrcode.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });

        // Boot-up generation
        updateQRCode();
    </script>
</body>
</html>
